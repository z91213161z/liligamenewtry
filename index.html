/* ═══ WEB AUDIO ENGINE ═══ */
const SFX = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) {
      try {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {}
    }
    return ctx;
  }
  function play(fn) {
    try {
      const c = ac();
      if (!c) return;
      if (c.state === 'suspended') c.resume();
      fn(c);
    } catch (e) {}
  }
  function env(g, now, atk, sus, rel) {
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(.32, now + atk);
    g.gain.setValueAtTime(.32, now + atk + sus);
    g.gain.linearRampToValueAtTime(0, now + atk + sus + rel);
  }
  return {
    swing() {
      play(c => {
        const now = c.currentTime;
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(320, now);
        o.frequency.exponentialRampToValueAtTime(80, now + .12);
        env(g, now, .005, .04, .07);
        o.start(now);
        o.stop(now + .16);
      });
    },
    hit() {
      play(c => {
        const now = c.currentTime;
        const buf = c.createBuffer(1, Math.floor(c.sampleRate * .08), c.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
        const src = c.createBufferSource();
        src.buffer = buf;
        const g = c.createGain();
        const flt = c.createBiquadFilter();
        flt.type = 'bandpass';
        flt.frequency.value = 800;
        src.connect(flt);
        flt.connect(g);
        g.connect(c.destination);
        g.gain.setValueAtTime(.22, now);
        g.gain.linearRampToValueAtTime(0, now + .08);
        src.start(now);
      });
    },
    hurt() {
      play(c => {
        const now = c.currentTime;
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        o.type = 'square';
        o.frequency.setValueAtTime(180, now);
        o.frequency.exponentialRampToValueAtTime(60, now + .18);
        env(g, now, .01, .1, .1);
        o.start(now);
        o.stop(now + .22);
      });
    },
    upgrade() {
      play(c => {
        const now = c.currentTime;
        [440, 554, 659, 880].forEach((f, i) => {
          const o = c.createOscillator();
          const g = c.createGain();
          o.connect(g);
          g.connect(c.destination);
          o.type = 'open';
          o.type = 'sine';
          o.frequency.value = f;
          g.gain.setValueAtTime(0, now + i * .06);
          g.gain.linearRampToValueAtTime(.18, now + i * .06 + .02);
          g.gain.linearRampToValueAtTime(0, now + i * .06 + .15);
          o.start(now + i * .06);
          o.stop(now + i * .06 + .18);
        });
      });
    },
    coin() {
      play(c => {
        const now = c.currentTime;
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(880, now);
        o.frequency.setValueAtTime(1320, now + .04);
        env(g, now, .005, .03, .06);
        o.start(now);
        o.stop(now + .1);
      });
    },
    death() {
      play(c => {
        const now = c.currentTime;
        [220, 185, 165, 140].forEach((f, i) => {
          const o = c.createOscillator();
          const g = c.createGain();
          o.connect(g);
          g.connect(c.destination);
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(f, now + i * .18);
          g.gain.setValueAtTime(.28, now + i * .18);
          g.gain.linearRampToValueAtTime(0, now + i * .18 + .3);
          o.start(now + i * .18);
          o.stop(now + i * .18 + .32);
        });
      });
    },
    wave() {
      play(c => {
        const now = c.currentTime;
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g);
        g.connect(c.destination);
        o.type = 'triangle';
        o.frequency.setValueAtTime(200, now);
        o.frequency.linearRampToValueAtTime(400, now + .2);
        env(g, now, .01, .12, .1);
        o.start(now);
        o.stop(now + .25);
      });
    },
    start() {
      play(c => {
        const now = c.currentTime;
        [330, 440, 550, 660].forEach((f, i) => {
          const o = c.createOscillator();
          const g = c.createGain();
          o.connect(g);
          g.connect(c.destination);
          o.type = 'sine';
          o.frequency.value = f;
          g.gain.setValueAtTime(0, now + i * .05);
          g.gain.linearRampToValueAtTime(.15, now + i * .05 + .02);
          g.gain.linearRampToValueAtTime(0, now + i * .05 + .12);
          o.start(now + i * .05);
          o.stop(now + i * .05 + .15);
        });
      });
    }
  };
})();

function wDmgMult() {

}

function isNearBase(x, y, r) {
  if (Math.hypot(x - HX, y - HY) < r) return true;
  for (const b of Object.values(BLDGS)) {
    if (Math.hypot(x - b.wx, y - b.wy) < r * .7) return true;
  }
  return false;
}

function spawnWave(w) {
  SFX.wave();
  const n = 4 + w * 3;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = 520 + Math.random() * 900;
    const isWolf = w >= 3 && Math.random() < .3;
    bears.push({
      x: HX + Math.cos(a) * d,
      y: HY + Math.sin(a) * d,
      hp: isWolf ? 15 + w * 8 : 25 + w * 18,
      mxHp: isWolf ? 15 + w * 8 : 25 + w * 18,
      spd: isWolf ? 1.4 + w * .18 : .7 + w * .12,
      atk: isWolf ? 3 + w * 2 : 4 + w * 3,
      sz: isWolf ? 14 : 18 + Math.min(w * 1.8, 14),
      col: isWolf ? '#aa5500' : null,
      boss: false,
      state: 'wander',
      angle: Math.random() * Math.PI * 2,
      wT: 0,
      atkCd: 0,
      flash: 0,
      bladeCd: 0
    });
  }
}

/* ═══ WORKERS ═══ */
function spawnCat(forced) {
  if (workers.length >= maxCats() && !forced) return;
  const lb = BLDGS.lumber;
  const col = `hsl(${30 + rng(60)},40%,${55 + rng(20)}%)`;
  workers.push({
    x: lb.wx + (Math.random() - .5) * 40,
    y: lb.wy + (Math.random() - .5) * 40,
    tx: lb.wx,
    ty: lb.wy,
    state: 'idle',
    timer: 0,
    carrying: 0,
    col,
    legT: 0
  });
}

function updateWorkers() {
  for (const w of workers) {
    w.timer++;
    w.legT += 0.18;
    if (w.state === 'idle') {
      if (w.timer > 60) {
        const avail = trees.filter(t => t.cd === 0 && Math.hypot(t.x - HX, t.y - HY) > 60);
        if (avail.length) {
          const t = avail[rng(avail.length)];
          w.tx = t.x;
          w.ty = t.y;
          w.state = 'walk_tree';
          w.timer = 0;
          w._tree = t;
        }
      }
    } else if (w.state === 'walk_tree') {
      const dx = w.tx - w.x;
      const dy = w.ty - w.y;
      const d = Math.hypot(dx, dy);
      const spd = BLDGS.lumber.lv >= 2 ? 2.2 : 1.6;
      if (d < 12) {
        w.state = 'chop';
        w.timer = 0;
      } else {
        w.x += dx / d * spd * dtScale;
        w.y += dy / d * spd * dtScale;
      }
    } else if (w.state === 'chop') {
      if (w.timer >= 45 && w._tree && w._tree.cd === 0) {
        const n = BLDGS.lumber.lv >= 4 ? 3 : BLDGS.lumber.lv >= 3 ? 2 : 1;
        w._tree.cd = 280;
        tableWood += n;
        w.carrying = n;
        spawnP(w._tree.x, w._tree.y, '#8a5522', 3);
        ft(w._tree.x, w._tree.y, `🪵+${n} Wood`, '#ddaa66');
        w.state = 'walk_back';
        w.tx = BLDGS.lumber.wx;
        w.ty = BLDGS.lumber.wy;
        w.timer = 0;
      } else if (w.timer > 80) {
        w.state = 'idle';
        w.timer = 0;
      }
    } else if (w.state === 'walk_back') {
      const dx = w.tx - w.x;
      const dy = w.ty - w.y;
      const d = Math.hypot(dx, dy);
      const spd = BLDGS.lumber.lv >= 2 ? 2.2 : 1.6;
      if (d < 12) {
        w.state = 'idle';
        w.timer = 0;
        w.carrying = 0;
      } else {
        w.x += dx / d * spd * dtScale;
        w.y += dy / d * spd * dtScale;
      }
    }
  }
}

function drawCat(wk) {
  const [sx, sy] = ws(wk.x, wk.y);
  if (sx < -30 || sx > W + 30 || sy < -30 || sy > H + 30) return;
  const moving = wk.state === 'walk_tree' || wk.state === 'walk_back';
  const lg = moving ? Math.sin(wk.legT * 3) * 4 : 0;
  ct.fillStyle = 'rgba(0,0,0,.12)';
  ct.beginPath();
  ct.ellipse(sx + 1, sy + 11, 8, 3, 0, 0, Math.PI * 2);
  ct.fill();
  ct.strokeStyle = wk.col;
  ct.lineWidth = 2.5;
  ct.lineCap = 'round';
  ct.beginPath();
  ct.moveTo(sx + 5, sy + 6);
  ct.quadraticCurveTo(sx + 16 + Math.sin(wk.legT) * 4, sy - 2, sx + 12 + Math.cos(wk.legT * .7) * 7, sy - 12);
  ct.stroke();
  ct.lineCap = 'butt';
  ct.fillStyle = wk.col;
  ct.fillRect(sx - 4, sy + 6, 4, 5 + lg);
  ct.fillRect(sx, sy + 6, 4, 5 - lg);
  ct.fillStyle = '#ffddcc';
  ct.beginPath();
  ct.ellipse(sx - 2, sy + 11 + lg, 2.5, 1.5, 0, 0, Math.PI * 2);
  ct.fill();
  ct.beginPath();
  ct.ellipse(sx + 2, sy + 11 - lg, 2.5, 1.5, 0, 0, Math.PI * 2);
  ct.fill();
  ct.fillStyle = wk.col;
  ct.beginPath();
  ct.ellipse(sx, sy + 1, 7, 6, 0, 0, Math.PI * 2);
  ct.fill();
  ct.fillStyle = 'rgba(255,240,220,.5)';
  ct.beginPath();
  ct.ellipse(sx, sy + 3, 4, 3.5, 0, 0, Math.PI * 2);
  ct.fill();
  ct.fillStyle = wk.col;
  ct.beginPath();
  ct.arc(sx, sy - 7, 6.5, 0, Math.PI * 2);
  ct.fill();
  ct.fillStyle = wk.col;
  ct.beginPath();
  ct.moveTo(sx - 4, sy - 11);
  ct.lineTo(sx - 8, sy - 19);
  ct.lineTo(sx - 1, sy - 13);
  ct.closePath();
  ct.fill();
  ct.beginPath();
  ct.moveTo(sx + 4, sy - 11);
  ct.lineTo(sx + 8, sy - 19);
  ct.lineTo(sx + 1, sy - 13);
  ct.closePath();
  ct.fill();
  ct.fillStyle = '#ffbbaa';
  ct.beginPath();
  ct.moveTo(sx - 4, sy - 12);
  ct.lineTo(sx - 7, sy - 17);
  ct.lineTo(sx - 2, sy - 13);
  ct.closePath();
  ct.fill();
  ct.beginPath();
  ct.moveTo(sx + 4, sy - 12);
  ct.lineTo(sx + 7, sy - 17);
  ct.lineTo(sx + 2, sy - 13);
  ct.closePath();
  ct.fill();
  ct.fillStyle = '#222';
  ct.beginPath();
  ct.ellipse(sx - 2.5, sy - 7, 1.5, 2, 0, 0, Math.PI * 2);
  ct.fill();
  ct.beginPath();
  ct.ellipse(sx + 2.5, sy - 7, 1.5, 2, 0, 0, Math.PI * 2);
  ct.fill();
  ct.fillStyle = '#fff';
  ct.beginPath();
  ct.arc(sx - 2, sy - 8, .7, 0, Math.PI * 2);
  ct.fill();
  ct.beginPath();
  ct.arc(sx + 3, sy - 8, .7, 0, Math.PI * 2);
  ct.fill();
  ct.fillStyle = '#ffaaaa';
  ct.beginPath();
  ct.arc(sx, sy - 5.5, 1.2, 0, Math.PI * 2);
  ct.fill();

document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.clientX < W * .45) {
      joy.on = true;
      joy.id = t.identifier;
      joy.bx = t.clientX;
      joy.by = t.clientY;
      joy.dx = 0;
      joy.dy = 0;
    }
  }
}, {passive: false});
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) {
      joy.dx = t.clientX - joy.bx;
      joy.dy = t.clientY - joy.by;
    }
  }
}, {passive: false});
cv.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) {
      joy.on = false;
      joy.dx = 0;
      joy.dy = 0;
    }
  }
}, {passive: false});

const COMP_COLS = ['#ff88cc', '#ddddff', '#ff6622', '#222244', '#aa44ff', '#44cc88'];
const COMP_DESIGNS = ['pink', 'white', 'flame', 'black', 'violet', 'jade'];
const COMP_NAMES_MAP = ['Lilith', 'Yukisei', 'Hioen', 'Antsuki', 'Violet', 'Jade'];
function maxCompanions() { return Math.min(2 + Math.floor(hLv / 2), 6); }

function spawnCompanion(type) {
  const i = companions.length;
  const mxHp = type === 'shield' ? 220 : 140;
  companions.push({
    x: HX + (Math.random() - .5) * 80,
    y: HY + (Math.random() - .5) * 80,
    hp: mxHp,
    mxHp,
    atk: type === 'sword' ? 25 + i * 8 : 10,
    type,
    col: COMP_COLS[i % COMP_COLS.length],
    inv: 0,
    atkCd: 0,
    flash: 0,
    animT: 0,
    name: COMP_NAMES_MAP[i % COMP_NAMES_MAP.length],
    design: COMP_DESIGNS[i % COMP_DESIGNS.length]
  });
}

function updateCompanions() {
  for (const c of companions) {
    c.animT += .15;
    if (c.flash > 0) c.flash--;
    if (c.inv > 0) c.inv--;
    if (c.atkCd > 0) c.atkCd--;
    const idx = companions.indexOf(c);
    const ang = (idx / Math.max(companions.length, 1)) * Math.PI * 2 + Math.PI * 0.5;
    const dist = 32 + idx * 10;
    const tx = P.wx + Math.cos(ang) * dist;
    const ty = P.wy + Math.sin(ang) * dist;
    const dx = tx - c.x;
    const dy = ty - c.y;
    const d = Math.hypot(dx, dy);
    if (d > 8) {
      const spd = Math.min(d * .2, P.spd * 1.05);
      c.x += dx / d * spd * dtScale;
      c.y += dy / d * spd * dtScale;
    }
    if (c.atkCd === 0 && c.type === 'sword') {
      let closest = null, bestD = 180;
      for (const b of bears) {
        if (b.hp <= 0) continue;
        const bd = Math.hypot(b.x - c.x, b.y - c.y);
        if (bd < bestD) {
          bestD = bd;
          closest = b;
        }
      }
      if (closest) {
        const dmg = c.atk + rng(8);
        closest.hp -= dmg;
        closest.flash = 6;
        spawnP(closest.x, closest.y, '#ffcc44', 3);
        ft(closest.x, closest.y - 12, `-${dmg}`, '#ffcc55');
        if (closest.hp <= 0) killBear(closest);
        c.atkCd = 35;
      }
    }
  }
  companions = companions.filter(c => c.hp > 0);
}

function drawCompanion(c) {
  const [sx, sy] = ws(c.x, c.y);
  if (sx < -40 || sx > W + 40 || sy < -40 || sy > H + 40) return;
  const lg = Math.sin(c.animT * 3) * 4;
  const fl = c.flash > 0;
  const now = Date.now();
  ct.fillStyle = 'rgba(0,0,0,.14)';
  ct.beginPath();
  ct.ellipse(sx + 1, sy + 24, 11, 4, 0, 0, Math.PI * 2);
  ct.fill();
  ct.save();
  ct.translate(0, 0);
  const d = c.design || 'pink';
  if (d === 'pink') drawCompPink(sx, sy, fl, lg, now);
  else if (d === 'white') drawCompWhite(sx, sy, fl, lg, now);
  else if (d === 'flame') drawCompFlame(sx, sy, fl, lg, now);
  else if (d === 'black') drawCompBlack(sx, sy, fl, lg, now);
  else if (d === 'violet') drawCompViolet(sx, sy, fl, lg, now);
  else drawCompJade(sx, sy, fl, lg, now);
  ct.restore();
  compHUD(sx, sy, c);
}

/* ═══ AUTO-UPGRADE SYSTEM ═══ */
const PROX = 88;
const PROX_HOLD = 65;
function phase2OK() { return BLDGS.lumber.lv >= 1 && BLDGS.meat.lv >= 1 && BLDGS.rail.lv >= 1 && BLDGS.pizza.lv >= 1 && BLDGS.farm.lv >= 1; }
function phase3OK() { return hLv >= 2; }
function bldgVisible(b) {
  if (b.phase === 1) return true;
  if (b.phase === 2) return phase2OK();
  return phase3OK();
}

function tickAutoUpgrade() {
  tickProx('house', HX, HY, () => {
    if (hLv >= HOUSES.length - 1) return false;
    const cost = HOUSES[hLv + 1].cost;
    if (P.gold < cost) {
      showMsg(`Need ${cost}💰 to upgrade house`);
      return false;
    }
    P.gold -= cost;
    hLv++;
    applyHouseBonus(hLv);
    saveGame();
    SFX.upgrade();
    spawnP(HX, HY, '#ffdd44', 28);
    ft(HX, HY - 80, `🏠 Upgraded -> ${HOUSES[hLv].name}!`, '#ffff66');
    showMsg(`${HOUSES[hLv].name} | ${HOUSES[hLv].bonus}`);
    return true;
  });
  tickProx('anvil', ANVIL.wx, ANVIL.wy, () => {
    if (P.wLv >= WEAPS.length) return false;
    const cost = WCOST[P.wLv];
    if (P.gold < cost) {
      showMsg(`Need ${cost}💰 to upgrade weapon`);
      return false;
    }
    P.gold -= cost;
    P.wLv++;
    ft(P.wx, P.wy - 50, `⚔️${WEAPS[P.wLv - 1].name}!`, '#ffee44');
    spawnP(P.wx, P.wy, '#ffdd44', 22);
    return true;
  });
  if (Math.hypot(P.wx - TABLE.wx, P.wy - TABLE.wy) < PROX) {
    if (P.wood > 0) {
      tableWood += P.wood;
      ft(P.wx, P.wy - 30, `+${P.wood} Wood`, '#ddaa66');
      P.wood = 0;
    }
    if (P.meat > 0) {
      tableMeat += P.meat;
      ft(P.wx, P.wy - 46, `+${P.meat}🥩`, '#ffaa66');
      P.meat = 0;
    }
    if (P.pizza > 0) {
      tablePizza += P.pizza;
      ft(P.wx, P.wy - 62, `+${P.pizza}🍕`, '#ffcc88');
      P.pizza = 0;
    }
    if (P.grain > 0) {
      tableGrain += P.grain;
      ft(P.wx, P.wy - 78, `+${P.grain}🌾`, '#eebb44');
      P.grain = 0;
    }
  }
  tickProx('recruit', RECRUIT.wx, RECRUIT.wy, () => {
    if (workers.length >= maxCats()) {
      showMsg(`Cats full (${maxCats()})! Upgrade Lumber Camp`);
      return false;
    }
    const cost = 50 + workers.length * 30;
    if (P.gold < cost) {
      showMsg(`Need ${cost}💰 to hire cat`);
      return false;
    }
    P.gold -= cost;
    spawnCat(true);
    ft(RECRUIT.wx, RECRUIT.wy - 40, '🐱 New cat joined!', '#ffeeaa');
    spawnP(RECRUIT.wx, RECRUIT.wy, '#ffcc44', 18);
    showMsg(`🐱 Cat Hired! (${workers.length}/${maxCats()})`);
    return true;
  });
  tickProx('bar1', BARRACKS1.wx, BARRACKS1.wy, () => {
    if (companions.length >= maxCompanions()) {
      showMsg(`Companions full (${maxCompanions()})! Upgrade House`);
      return false;
    }
    const cost = 120 + companions.length * 80;
    if (P.gold < cost) {
      showMsg(`Need ${cost}💰 for ⚔️ Sword Companion`);
      return false;
    }
    P.gold -= cost;
    spawnCompanion('sword');
    ft(BARRACKS1.wx, BARRACKS1.wy - 44, '⚔️ Sword Companion joined!', '#aaccff');
    spawnP(BARRACKS1.wx, BARRACKS1.wy, '#3355cc', 22);
    showMsg(`⚔️ Sword Companion! Atk+, Total ${companions.length}/${maxCompanions()}`);
    return true;
  });
  tickProx('bar2', BARRACKS2.wx, BARRACKS2.wy, () => {
    if (companions.length >= maxCompanions()) {
      showMsg(`Companions full (${maxCompanions()})! Upgrade House`);
      return false;
    }
    const cost = 140 + companions.length * 80;
    if (P.gold < cost) {
      showMsg(`Need ${cost}💰 for 🛡️ Shield Companion`);
      return false;
    }
    P.gold -= cost;
    spawnCompanion('shield');
    ft(BARRACKS2.wx, BARRACKS2.wy - 44, '🛡️ Shield Companion joined!', '#aaffcc');
    spawnP(BARRACKS2.wx, BARRACKS2.wy, '#229955', 22);
    showMsg(`🛡️ Shield Companion! Def+, Total ${companions.length}/${maxCompanions()}`);
    return true;
  });
  if (hLv >= 6) {
    for (let i = 0; i < OUTPOST_SPOTS.length; i++) {
      const sp = OUTPOST_SPOTS[i];
      if (sp.active) continue;
      tickProx(`outpost${i}`, sp.wx, sp.wy, () => {
        if (P.gold < 800) {
          showMsg('Need 800💰 to build Magic Station');
          return false;
        }
        P.gold -= 800;
        sp.active = true;
        sp.timer = 0;
        spawnP(sp.wx, sp.wy, '#aa44ff', 30);
        ft(sp.wx, sp.wy - 60, '✨ Magic Station built!', '#cc88ff');
        showMsg(`Magic Station (${sp.type}) built!`);
        return true;
      });
    }
  }
  for (const [k, b] of Object.entries(BLDGS)) {
    if (!bldgVisible(b)) continue;
    tickProx(k, b.wx, b.wy, () => {
      if (b.lv >= b.maxLv) return false;
      const cost = b.costs[b.lv];
      if (P.gold < cost) {
        showMsg(`Need ${cost}💰 to upgrade ${b.name}`);
        return false;
      }
      P.gold -= cost;
      b.lv++;
      saveGame();
      SFX.upgrade();
      spawnP(b.wx, b.wy, '#44ffaa', 22);
      ft(b.wx, b.wy - 50, `${b.name} Lv${b.lv}`, '#88ff88');
      showMsg(`${b.name} Lv${b.lv}: ${b.bonuses[b.lv - 1]}`);
      return true;
    });
  }
}

function tickProx(key, wx, wy, action) {
  const near = Math.hypot(P.wx - wx, P.wy - wy) < PROX;
  if (near) {
    upgradeTimers[key] = (upgradeTimers[key] || 0) + 1;
    if (upgradeTimers[key] >= PROX_HOLD) {
      const did = action();
      upgradeTimers[key] = did ? 0 : -40;
    }
  } else {
    upgradeTimers[key] = 0;
  }
}

function applyHouseBonus(lv) {
  if (lv === 1) {
    P.mxHp += 30;
    P.hp = Math.min(P.hp + 30, P.mxHp);
  } else if (lv === 2) {
    P.spd += 1.0;
  } else if (lv === 3) {
    P.autoHeal = true;
  } else if (lv === 4) {
    P.bonusBlade = 1;
  } else if (lv === 5) {
    P.spd += 1.0;
    P.mxHp += 50;
    P.hp = Math.min(P.hp + 50, P.mxHp);
  } else if (lv === 6) {
    P.bonusBlade++;
    showMsg('✨ Magic Castle Unlocked! Build Magic Stations!');
  }
}

/* ═══ COMBAT UTILS ═══ */
function updateBlade() {
  bladeAngle += .055;
  const w = WEAPS[P.wLv - 1];
  const R = w.r;
  const atk = Math.round(w.bAtk * wDmgMult());
  for (const b of bears) {
    if (b.hp <= 0) continue;
    if (b.bladeCd > 0) {
      b.bladeCd--;
      continue;
    }
    if (Math.hypot(P.wx - b.x, P.wy - b.y) < R + b.sz) {
      const d = atk + rng(8);
      b.hp -= d;
      b.flash = 8;
      b.bladeCd = 18 + rng(6);
      SFX.swing();
      spawnP(b.x, b.y, '#ff4444', 4);
      ft(b.x, b.y, `-${d}`, '#ff6655');
      if (b.hp <= 0) killBear(b);
    }
  }
  for (const t of trees) {
    if (t.cd > 0) continue;
    if (Math.hypot(P.wx - t.x, P.wy - t.y) < R + t.r) {
      const n = BLDGS.lumber.lv >= 3 ? 2 : 1;
      P.wood += n;
      t.cd = 340;
      spawnP(t.x, t.y, '#8a5522', 3);
      ft(t.x, t.y, n > 1 ? '+Wood x2' : '+Wood', '#ddaa66');
    }
  }
}

function killBear(b) {
  killCount++;
  SFX.hit();
  spawnP(b.x, b.y, '#ffaa44', b.boss ? 32 : 12);
  const n = b.boss ? 8 : 1;
  for (let i = 0; i < n; i++) {
    drops.push({x: b.x + (Math.random() - .5) * 40, y: b.y + (Math.random() - .5) * 40, type: 'meat', age: 0, taken: false});
  }
  ft(b.x, b.y - 16, `+🥩x${n}`, '#ffcc44');
  if (b.boss) {
    screenShake = 20;
    P.gold += 50;
    ft(b.x, b.y - 36, 'BOSS! +50💰', '#ffff44');
  } else {
    if (Math.random() < .4) {
      const g = 3 + Math.floor(Math.random() * 10);
      P.gold += g;
      ft(b.x, b.y - 28, `+${g}💰`, '#ffdd44');
      SFX.coin();
    }
  }
}

/* ═══ ECONOMY TICK ═══ */
function tickBuildings() {
  updateWorkers();
  const mf = BLDGS.meat;
  if (mf.lv > 0) {
    mf.timer++;
    const rate = [380, 200, 130, 80][mf.lv - 1];
    if (mf.timer >= rate) {
      mf.timer = 0;
      let col = 0;
      for (const d of drops) {
        if (!d.taken && d.type === 'meat') {
          d.taken = true;
          col++;
        }
      }
      if (col > 0) {
        const bonus = mf.lv >= 3 ? 2 : 1;
        tableMeat += col * bonus;
        spawnP(mf.wx, mf.wy, '#ffaa66', 5);
        ft(mf.wx, mf.wy - 24, `Harvest Meat+${col * bonus}`, '#ffaa66');
      }
    }
  }
  const pz = BLDGS.pizza;
  if (pz.lv > 0) {
    pz.timer++;
    const meat = [2, 1, 1, 1][pz.lv - 1];
    const out = [1, 1, 2, 4][pz.lv - 1];
    const cd = [10800, 7200, 5000, 3500][pz.lv - 1];
    if (pz.timer >= cd && tableMeat >= meat) {
      pz.timer = 0;
      tableMeat -= meat;
      tablePizza += out;
      spawnP(pz.wx, pz.wy, '#ffcc44', 8);
      ft(pz.wx, pz.wy - 28, `🍕x${out}`, '#ffee66');
    }
  }
  const fm = BLDGS.farm;
  if (fm.lv > 0) {
    fm.timer++;
    const rate = [480, 280, 200, 130][fm.lv - 1];
    if (fm.timer >= rate) {
      fm.timer = 0;
      const n = fm.lv >= 4 ? 5 : fm.lv >= 3 ? 3 : 1;
      tableGrain += n;
      spawnP(fm.wx, fm.wy, '#ddcc44', 5);
      ft(fm.wx, fm.wy - 24, `+🌾${n}`, '#eebb44');
    }
  }
  const rl = BLDGS.rail;
  if (rl.lv > 0) {
    const spd = [0.004, 0.008, 0.014, 0.022][rl.lv - 1];
    rl.cart.t = (rl.cart.t || 0) + spd;
    if (rl.cart.t >= 1) {
      rl.cart.t = 0;
      ft(TABLE.wx, TABLE.wy - 28, '🚂+Wood', '#ddaa66');
    }
  }
  const inn = BLDGS.inn;
  if (inn.lv > 0) {
    inn.timer = (inn.timer || 0) + 1;
  }
  const mn = BLDGS.mine;
  if (mn.lv > 0) {
    mn.mineTimer = (mn.mineTimer || 0) + 1;
    const rate = mn.lv >= 2 ? 300 : 600;
    const amount = mn.lv >= 2 ? 8 : 3;
    if (mn.mineTimer >= rate) {
      mn.mineTimer = 0;
      P.gold += amount;
      ft(mn.wx, mn.wy - 24, `+${amount}💰(Mine)`, '#ffdd44');
    }
  }
  for (const sp of OUTPOST_SPOTS) {
    if (!sp.active) continue;
    sp.timer++;
    if (sp.timer >= 360) {
      sp.timer = 0;
      if (sp.type === 'gold') {
        P.gold += 12;
        ft(sp.wx, sp.wy - 30, '+12💰', '#ffdd44');
      } else if (sp.type === 'wood') {
        tableWood += 4;
        ft(sp.wx, sp.wy - 30, '+4 Wood', '#ddaa66');
      } else if (sp.type === 'meat') {
        tableMeat += 3;
        ft(sp.wx, sp.wy - 30, '+3🥩', '#ffaa66');
      }
      spawnP(sp.wx, sp.wy, '#aa44ff', 6);
    }
  }
}

/* ═══ CUSTOMERS ═══ */
function custCap() {
  let c = 28;
  if (BLDGS.store.lv >= 1) c *= 2;
  if (BLDGS.store.lv >= 2) c *= 2;
  return c;
}
function railMult() { return BLDGS.rail.lv ? [1.15, 1.30, 1.50, 1.80][BLDGS.rail.lv - 1] : 1; }
function innMult() { return BLDGS.market.lv ? 1.5 : 1; }

function spawnCustomer() {
  const sides = [[rng(WS), 80], [WS - 80, rng(WS)], [rng(WS), WS - 80], [80, rng(WS)]];
  const [sx, sy] = sides[rng(4)];
  const hasPizza = BLDGS.pizza.lv > 0 && tablePizza > 0;
  const hasGrain = BLDGS.farm.lv > 0 && tableGrain > 0;
  const type = hasPizza && Math.random() < .3 ? 'pizza' : hasGrain && Math.random() < .25 ? 'grain' : tableMeat > 0 && Math.random() < .25 ? 'meat' : 'wood';
  const waitTime = BLDGS.inn.lv >= 1 ? 400 + rng(250) : 200 + rng(150);
  customers.push({x: sx, y: sy, spd: 1.7 + Math.random() * .5, state: 'walk', wt: waitTime, done: false, type, col: `hsl(${rng(360)},55%,55%)`, pulse: 0});
}

function updateCustomer(c) {
  const tx = TABLE.wx, ty = TABLE.wy;
  c.pulse = (c.pulse || 0) + .1;
  if (c.state === 'walk') {
    const dx = tx - c.x;
    const dy = ty - c.y;
    const d = Math.hypot(dx, dy);
    if (d < 20) {
      c.state = 'wait';
    } else {
      c.x += dx / d * c.spd * dtScale;
      c.y += dy / d * c.spd * dtScale;
    }
  } else if (c.state === 'wait') {
    c.wt--;
    const mult = railMult() * innMult() * (BLDGS.inn.lv >= 2 ? 2 : 1) * (BLDGS.inn.lv >= 3 ? 1.5 : 1);
    let bought = false;
    if (c.type === 'pizza' && tablePizza > 0) {
      const n = Math.min(tablePizza, 1 + rng(2));
      const price = Math.floor(n * (BLDGS.pizza.lv >= 4 ? 150 : BLDGS.pizza.lv >= 3 ? 90 : 42 + rng(14)) * mult);
      tablePizza -= n; P.gold += price; P.coinAnim = 30; SFX.coin(); spawnP(tx, ty, '#ffdd44', 10);
      ft(tx, ty - 22, `+${price}💰🍕`, '#ffdd44'); c.state = 'leave'; bought = true;
    } else if (c.type === 'grain' && tableGrain > 0) {
      const n = Math.min(tableGrain, 2 + rng(3));
      const price = Math.floor(n * (22 + rng(10)) * mult);
      tableGrain -= n; P.gold += price; P.coinAnim = 30; SFX.coin(); spawnP(tx, ty, '#ffdd44', 8);
      ft(tx, ty - 22, `+${price}💰🌾`, '#eebb44'); c.state = 'leave'; bought = true;
    } else if (c.type === 'meat' && tableMeat > 0) {
      const n = Math.min(tableMeat, 1 + rng(2));
      const price = Math.floor(n * (20 + rng(8)) * mult);
      tableMeat -= n; P.gold += price; P.coinAnim = 30; SFX.coin(); spawnP(tx, ty, '#ffdd44', 8);
      ft(tx, ty - 22, `+${price}💰🥩`, '#ffdd44'); c.state = 'leave'; bought = true;
    } else if (c.type === 'wood' && tableWood > 0) {
      const n = Math.min(tableWood, 2 + rng(3));
      const price = Math.floor(n * (12 + rng(6)) * mult);
      tableWood -= n; P.gold += price; P.coinAnim = 30; SFX.coin(); spawnP(tx, ty, '#ffdd44', 8);
      ft(tx, ty - 22, `+${price}💰🪵`, '#ffdd44'); c.state = 'leave'; bought = true;
    }
    if (!bought && c.wt <= 0) c.state = 'leave';
  } else {
    const dx = c.x - HX;
    const dy = c.y - HY;
    const d = Math.hypot(dx, dy) || 1;
    c.x += dx / d * c.spd * 1.3 * dtScale;
    c.y += dy / d * c.spd * 1.3 * dtScale;
    if (c.x < -80 || c.x > WS + 80 || c.y < -80 || c.y > WS + 80) c.done = true;
  }
}

/* ═══ UTILS ═══ */
function spawnP(x, y, col, n) {
  for (let i = 0; i < n; i++) parts.push({x, y, vx:(Math.random() - .5) * 5, vy:(Math.random() - .5) * 5, life:22 + rng(14), mxL:36, col, r:2 + Math.random() * 3});
}
function ft(wx, wy, text, col) { ftexts.push({wx, wy, text, col, life:95, vy:-.55}); }
function showMsg(t) { msg = t; msgT = 200; }
function rng(n) { return Math.floor(Math.random() * n); }
function ws(x, y) { return [x - camX, y - camY]; }
function rrect(x, y, w2, h2, r) {
  ct.beginPath();
  ct.moveTo(x + r, y);
  ct.lineTo(x + w2 - r, y);
  ct.quadraticCurveTo(x + w2, y, x + w2, y + r);
  ct.lineTo(x + w2, y + h2 - r);
  ct.quadraticCurveTo(x + w2, y + h2, x + w2 - r, y + h2);
  ct.lineTo(x + r, y + h2);
  ct.quadraticCurveTo(x, y + h2, x, y + h2 - r);
  ct.lineTo(x, y + r);
  ct.quadraticCurveTo(x, y, x + r, y);
  ct.closePath();
}

/* ═══ GAME SYSTEM LOOP ═══ */
function update() {
  frameN++;
  P.animT += .18;
  if (P.coinAnim > 0) P.coinAnim--;
  let mx = 0, my = 0;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) my -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) my += 1;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) mx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) mx += 1;
  if (joy.on) {
    const l = Math.hypot(joy.dx, joy.dy);
    if (l > 12) {
      mx = joy.dx / l;
      my = joy.dy / l;
    }
  }
  if (mx && my) {
    mx *= .707;
    my *= .707;
  }
  P.moving = mx !== 0 || my !== 0;
  if (P.moving) {
    P.wx = Math.max(30, Math.min(WS - 30, P.wx + mx * P.spd * dtScale));
    P.wy = Math.max(30, Math.min(WS - 30, P.wy + my * P.spd * dtScale));
    P.facing = Math.atan2(my, mx);
  }
  const carry = P.wood + P.meat + P.grain;
  P.wobble = carry > 20 ? Math.sin(frameN * .2) * .08 : 0;
  const camSpeed = Math.min(.1 * dtScale, .4);
  camX += (P.wx - CX - camX) * camSpeed;
  camY += (P.wy - CY - camY) * camSpeed;
  if (P.inv > 0) P.inv--;
  if (frameN % 240 === 0 && P.hp > 0 && P.hp < P.mxHp && Math.hypot(P.wx - HX, P.wy - HY) < wallR() + 60) {
    P.hp = Math.min(P.mxHp, P.hp + 1);
    ft(HX, HY - 30, '+1❤', '#88ff88');
  }
  for (const t of trees) { if (t.cd > 0) t.cd--; }
  if (P.autoHeal) {
    P.healTimer = (P.healTimer || 0) + 1;
    if (P.healTimer >= 180) {
      P.healTimer = 0;
      if (P.hp < P.mxHp) P.hp = Math.min(P.mxHp, P.hp + 3);
    }
  }
  updateBlade();
  tickAutoUpgrade();
  tickBuildings();
  updateCompanions();
  const wr = wallR();
  for (const b of bears) {
    if (b.hp <= 0) continue;
    if (b.flash > 0) b.flash--;
    if (b.atkCd > 0) b.atkCd--;
    const dx = P.wx - b.x;
    const dy = P.wy - b.y;
    const d = Math.hypot(dx, dy);
    if (!b.boss && Math.hypot(b.x - HX, b.y - HY) < wr - 12) {
      const ang = Math.atan2(b.y - HY, b.x - HX);
      b.x = HX + Math.cos(ang) * (wr + 8);
      b.y = HY + Math.sin(ang) * (wr + 8);
    }
    if (d < (b.boss ? 720 : 420)) {
      b.state = 'chase';
      const nx = b.x + dx / d * b.spd * dtScale;
      const ny = b.y + dy / d * b.spd * dtScale;
      const blocked = !b.boss && Math.hypot(nx - HX, ny - HY) < wr;
      if (!blocked) {
        b.x = nx;
        b.y = ny;
      }
      if (d < b.sz + 18 && b.atkCd === 0 && P.inv === 0) {
        const shields = companions.filter(c => Math.hypot(c.x - P.wx, c.y - P.wy) < 80 && c.inv === 0);
        let dmgToPlayer = b.atk;
        if (shields.length > 0) {
          const blockPct = Math.min(0.85, 0.4 + shields.length * 0.15);
          const absorbed = Math.round(b.atk * blockPct);
          dmgToPlayer = b.atk - absorbed;
          const sc = shields[rng(shields.length)];
          sc.hp = Math.max(0, sc.hp - absorbed);
          sc.flash = 10;
          sc.inv = 30;
          spawnP(sc.x, sc.y, '#4488ff', 6);
          ft(sc.x, sc.y - 20, `🛡️-${absorbed}`, '#88bbff');
        }
        if (dmgToPlayer > 0) {
          P.hp = Math.max(0, P.hp - dmgToPlayer);
          P.inv = 35;
          screenShake = 10;
          SFX.hurt();
          ft(P.wx, P.wy - 22, `-${dmgToPlayer}`, '#ff4444');
          spawnP(P.wx, P.wy, '#ff4444', 4);
        }
        b.atkCd = b.boss ? 120 : 30;
        if (P.hp <= 0) {
          SFX.death();
          deathWave = wave;
          deathKills = killCount;
          deathTime = Math.floor(playTime / 60); if(deathWave>bestWave||(deathWave===bestWave&&deathKills>bestKills)){bestWave=deathWave;bestKills=deathKills;try{localStorage.setItem('mm_best',JSON.stringify({w:bestWave,k:bestKills}));}catch(e){}}
          gameState = 'dead';
          saveGame();
        }
      }
    } else {
      b.state = 'wander';
      b.wT--;
      if (b.wT <= 0) {
        b.angle = Math.random() * Math.PI * 2;
        b.wT = 80 + rng(120);
      }
      const nb_x = b.x + Math.cos(b.angle) * b.spd * .4 * dtScale;
      const nb_y = b.y + Math.sin(b.angle) * b.spd * .4 * dtScale;
      if (b.boss || Math.hypot(nb_x - HX, nb_y - HY) >= wr) {
        b.x = nb_x;
        b.y = nb_y;
      }
    }
  }
  for (const d of drops) {
    d.age++;
    if (!d.taken && Math.hypot(P.wx - d.x, P.wy - d.y) < 28) {
      if (d.type === 'meat') {
        P.meat++; d.taken = true; SFX.coin(); spawnP(d.x, d.y, '#ffaa66', 4);
      } else if (d.type === 'wood') {
        P.wood++; d.taken = true; SFX.coin(); spawnP(d.x, d.y, '#ddaa66', 4);
      }
    }
  }
  drops = drops.filter(d => !d.taken && d.age < 800);
  custTimer--;
  const mkt = BLDGS.market.lv ? [1.4, 1.8][BLDGS.market.lv - 1] : 1;
  if (custTimer <= 0) {
    custTimer = Math.floor(Math.max(40, 210 - wave * 10) / mkt);
    if (customers.length < custCap()) spawnCustomer();
  }
  for (const c of customers) updateCustomer(c);
  customers = customers.filter(c => !c.done);
  wTimer++;
  if (wTimer >= 65 * 60) {
    wTimer = 0; wave++; spawnWave(wave);
    showMsg(`⚔️ Wave ${wave} Shrimp-Chickens incoming!`);
  }
  bossTimer++;
  if (bossTimer >= 180 * 60) {
    bossTimer = 0; spawnBoss();
  }
  for (const p of parts) { p.x += p.vx; p.y += p.vy; p.vx *= .92; p.vy *= .92; p.life--; }
  parts = parts.filter(p => p.life > 0);
  for (const f of ftexts) { f.wy += f.vy; f.life--; }
  ftexts = ftexts.filter(f => f.life > 0);
}

/* ═══ MASTER GRAPHICS DRAW ═══ */
function draw() {
  ct.save();
  if (screenShake > 0) {
    const sx = (Math.random() - .5) * screenShake;
    const sy = (Math.random() - .5) * screenShake;
    ct.translate(sx, sy);
    screenShake = Math.max(0, screenShake - 1);
  }
  ct.clearRect(0, 0, W, H);
  drawGround();
  const ents = [
    ...trees.map(t => ({y: t.y, fn: () => drawTree(t)})),
    {y: HY - 400, fn: drawFence},
    {y: HY - 390, fn: drawAllBuildings},
    ...workers.map(wk => ({y: wk.y, fn: () => drawCat(wk)})),
    ...drops.map(d => ({y: d.y, fn: () => drawDrop(d)})),
    ...customers.map(c => ({y: c.y, fn: () => drawCust(c)})),
    ...bears.filter(b => b.hp > 0).map(b => ({y: b.y, fn: () => drawShrimpChicken(b)})),
    ...companions.map(c => ({y:c.y, fn: () => drawCompanion(c)})),
    {y: P.wy - 1, fn: drawBlade},
    {y: P.wy, fn: drawPlayer},
  ];
  ents.sort((a, b) => a.y - b.y).forEach(e => e.fn());
  for (const p of parts) {
    const [sx, sy] = ws(p.x, p.y);
    ct.globalAlpha = p.life / p.mxL;
    ct.fillStyle = p.col;
    ct.beginPath();
    ct.arc(sx, sy, p.r, 0, Math.PI * 2);

  }
  ct.globalAlpha = 1;

  v.addColorStop(1, 'rgba(0,0,0,.18)');

}

function drawGround() {
  ct.fillStyle = '#3a7a2a';
  ct.fillRect(0, 0, W, H);
  const ts = 80;
  const ox = (-(camX % ts) + ts) % ts;
  const oy = (-(camY % ts) + ts) % ts;
  for (let x = ox - ts; x < W + ts; x += ts) {
    for (let y = oy - ts; y < H + ts; y += ts) {
      const tx = Math.floor((x + camX) / ts);
      const ty2 = Math.floor((y + camY) / ts);
      ct.fillStyle = ((tx + ty2) % 2 === 0) ? '#3d8830' : '#358028';
      ct.fillRect(x, y, ts, ts);
    }
  }
  const gsx = Math.floor(camX / 24), gsy = Math.floor(camY / 24);
  for (let gx = gsx - 1; gx < gsx + Math.ceil(W / 24) + 2; gx++) {
    for (let gy = gsy - 1; gy < gsy + Math.ceil(H / 24) + 2; gy++) {
      const h2 = (gx * 7 + gy * 13) % 23;
      if (h2 < 5) {
        const px = gx * 24 - camX + h2 * 3, py = gy * 24 - camY + h2 * 3;
        ct.fillStyle = 'rgba(0,80,0,.22)';
        ct.fillRect(px, py + 2, 2, 5);
        ct.fillRect(px + 3, py, 2, 7);

  }
  ct.strokeStyle = '#1a3a0a';
  ct.lineWidth = 16;
  ct.strokeRect(-camX, -camY, WS, WS);
  if (hLv >= 6) {
    for (const sp of OUTPOST_SPOTS) {

        ct.strokeStyle = `rgba(170,68,255,${pulse * .9})`; ct.lineWidth = 2; ct.beginPath(); ct.arc(sx, sy, 32, 0, Math.PI * 2); ct.stroke();
        ct.fillStyle = '#6622aa'; ct.fillRect(sx - 5, sy - 28, 10, 30);
        ct.fillStyle = '#aa44ff'; ct.beginPath(); ct.moveTo(sx, sy - 42); ct.lineTo(sx - 8, sy - 28); ct.lineTo(sx + 8, sy - 28); ct.closePath(); ct.fill();
        ct.fillStyle = `rgba(220,180,255,${pulse})`; ct.beginPath(); ct.arc(sx, sy - 40, 5, 0, Math.PI * 2); ct.fill();
        ct.fillStyle = '#fff'; ct.font = '11px sans-serif'; ct.textAlign = 'center';
        ct.fillText(sp.type === 'gold' ? '💰' : sp.type === 'wood' ? '🪵' : '🥩', sx, sy - 46);
      } else {
        const t = (upgradeTimers[`outpost${OUTPOST_SPOTS.indexOf(sp)}`] || 0) / PROX_HOLD;
        const pulse = Math.sin(frameN * .08) * .4;
        ct.fillStyle = `rgba(200,150,255,${.08 + pulse * .08})`; ct.beginPath(); ct.arc(sx, sy, 26, 0, Math.PI * 2); ct.fill();
        ct.strokeStyle = `rgba(180,100,255,${.4 + pulse * .3})`; ct.lineWidth = 1.5; ct.setLineDash([5, 4]); ct.beginPath(); ct.arc(sx, sy, 26, 0, Math.PI * 2); ct.stroke(); ct.setLineDash([]);
        ct.fillStyle = 'rgba(220,180,255,.8)'; ct.font = '11px sans-serif'; ct.textAlign = 'center'; ct.fillText('✨ Magic Station 800💰', sx, sy + 4);
        if (t > 0) { ct.strokeStyle = '#aa44ff'; ct.lineWidth = 3; ct.beginPath(); ct.arc(sx, sy - 34, 10, -Math.PI / 2, -Math.PI / 2 + t * Math.PI * 2); ct.stroke(); }

function drawFence() {
  const [hx, hy] = ws(HX, HY);
  const wr = wallR();
  const sides = Math.max(8, Math.floor(wr / 18));
  ct.fillStyle = 'rgba(100,200,80,.06)';
  ct.beginPath();
  ct.arc(hx, hy, wr, 0, Math.PI * 2);
  ct.fill();
  ct.strokeStyle = '#6a3a10';
  ct.lineWidth = 4;
  ct.beginPath();
  for (let i = 0; i <= sides; i++) {
    const a = (i / sides) * Math.PI * 2;
    const px = hx + Math.cos(a) * wr;
    const py = hy + Math.sin(a) * wr;
    if (i === 0) ct.moveTo(px, py); else ct.lineTo(px, py);
  }
  ct.stroke();
  ct.strokeStyle = '#8a5a20';
  ct.lineWidth = 2;
  ct.beginPath();
  for (let i = 0; i <= sides; i++) {
    const a = (i / sides) * Math.PI * 2;
    const px = hx + Math.cos(a) * (wr - 6);
    const py = hy + Math.sin(a) * (wr - 6);
    if (i === 0) ct.moveTo(px, py); else ct.lineTo(px, py);
  }
  ct.stroke();
  ct.fillStyle = '#5a2e08';
  for (let i = 0; i < sides; i++) {
    const a = (i / sides) * Math.PI * 2;
    const px = hx + Math.cos(a) * wr;
    const py = hy + Math.sin(a) * wr;
    ct.fillRect(px - 3, py - 6, 6, 12);
  }
  ct.fillStyle = 'rgba(58,122,42,.9)';
  ct.fillRect(hx - 22, hy + wr - 8, 44, 14);
  ct.fillStyle = 'rgba(0,0,0,.5)';
  rrect(hx - 44, hy - wr - 22, 88, 16, 4);
  ct.fill();
  ct.fillStyle = '#ddffaa';
  ct.font = 'bold 12px sans-serif';
  ct.textAlign = 'center';
  ct.fillText(`🏠${HOUSES[hLv].name} Lv${hLv}`, hx, hy - wr - 9);
}

function isoBox(sx, sy, w, fH, tD, rW, topC, frontC, sideC, rimC) {

  const top = sy - fH;

  ct.fillStyle = sideC; ct.beginPath(); ct.moveTo(r, sy); ct.lineTo(r + rW, sy - rW * .5); ct.lineTo(r + rW, top - tD - rW * .5); ct.lineTo(r, top - tD); ct.closePath(); ct.fill();
  ct.fillStyle = topC; ct.beginPath(); ct.moveTo(l, top - tD); ct.lineTo(r, top - tD); ct.lineTo(r + rW, top - tD - rW * .5); ct.lineTo(l + rW, top - tD - rW * .5); ct.closePath(); ct.fill();
  ct.fillStyle = frontC; ct.fillRect(l, top, w, fH);
  if (rimC) { ct.strokeStyle = rimC; ct.lineWidth = 1.2; ct.beginPath(); ct.moveTo(l, top - tD); ct.lineTo(r, top - tD); ct.lineTo(r + rW, top - tD - rW * .5); ct.stroke(); }
  ct.strokeStyle = 'rgba(0,0,0,.18)'; ct.lineWidth = 1; ct.strokeRect(l, top, w, fH);
  ct.beginPath(); ct.moveTo(r, top); ct.lineTo(r + rW, top - rW * .5); ct.lineTo(r + rW, sy - rW * .5); ct.lineTo(r, sy); ct.stroke();
  ct.beginPath(); ct.moveTo(l, top - tD); ct.lineTo(r, top - tD); ct.lineTo(r + rW, top - tD - rW * .5); ct.stroke();
}

function drawSmoke(sx, sy, col, n) {
  const t = Date.now() / 900;
  for (let i = 0; i < n; i++) {

    ct.globalAlpha = (1 - rise) * .28;
    ct.fillStyle = col;
    ct.beginPath();
    ct.arc(sx + Math.sin(ph * 4) * 4, sy - rise * 24 - i * 8, 3.5 + rise * 5, 0, Math.PI * 2);
    ct.fill();
  }
  ct.globalAlpha = 1;
}

function drawCust(c) {
  const [sx, sy] = ws(c.x, c.y);

  ct.fillText(`Wave ${deathWave}  |  Kills ${deathKills}`, CX, H * .38); if(bestWave>0){ct.fillStyle='rgba(255,215,0,.95)';ct.font=`${Math.floor(W*.036)}px sans-serif`;ct.fillText('Best: Wave '+bestWave+' | Kills '+bestKills, CX, H*.54);}
  ct.fillText(`Play Time: ${mins}m ${secs < 10 ? '0' : ''}${secs}s`, CX, H * .46);
  ct.strokeStyle = 'rgba(255,80,80,.4)'; ct.lineWidth = 1; ct.beginPath(); ct.moveTo(CX - 120, H * .52); ct.lineTo(CX + 120, H * .52); ct.stroke();
  ct.fillStyle = 'rgba(255,200,100,.75)'; ct.font = `${Math.floor(W * .032)}px sans-serif`;
  ct.fillText('Progress saved — Buildings kept', CX, H * .57);
  const pulse = .72 + Math.sin(Date.now() * .003) * .28;
  ct.fillStyle = `rgba(50,100,220,${pulse})`;
  rrect(CX - 100, H * .64, 200, 52, 26); ct.fill();
  ct.strokeStyle = 'rgba(140,180,255,.8)'; ct.lineWidth = 2.5; rrect(CX - 100, H * .64, 200, 52, 26); ct.stroke();
  ct.fillStyle = '#fff'; ct.font = `bold ${Math.floor(W * .047)}px sans-serif`; ct.textAlign = 'center';
  ct.fillText('↻ Play Again', CX, H * .64 + 36);
  ct.font='bold 18px monospace'; ct.fillStyle='#FFD700'; ct.textAlign='center';
  ct.fillText('Wave: '+wave, W/2, H/2+30);
  ct.fillText('Kills: '+killCount, W/2, H/2+58);
}

/* ═══ TUTORIAL HINTS ═══ */
function drawTutorial() {
  if (tutorialTimer > 60 * 60) return;
  tutorialTimer++;
  const t = tutorialTimer;
  const fadeIn = Math.min(1, t / 40), fadeOut = Math.min(1, (60 * 60 - t) / 50);
  ct.globalAlpha = Math.min(fadeIn, fadeOut) * .9;
  ct.fillStyle = 'rgba(0,0,0,.55)'; ct.font = `bold ${Math.floor(W * .035)}px sans-serif`; ct.textAlign = 'center';
  if (t < 20 * 60) {
    rrect(CX - 130, H * .86 - 22, 260, 38, 8); ct.fill();
    ct.fillStyle = '#ffffaa'; ct.fillText('☞ Drag left screen to move / WASD', CX, H * .86 + 8);
  } else if (t < 40 * 60) {
    rrect(CX - 120, H * .86 - 22, 240, 38, 8); ct.fill();
    ct.fillStyle = '#ffddaa'; ct.fillText('⚔️ Auto-attack nearby monsters!', CX, H * .86 + 8);
  } else {
    rrect(CX - 130, H * .86 - 22, 260, 38, 8); ct.fill();
    ct.fillStyle = '#aaffaa'; ct.fillText('🏠 Auto-upgrade nearby buildings!', CX, H * .86 + 8);
  }
  ct.globalAlpha = 1;
}

/* ═══ GAME LOOP ═══ */
function loop(ts) {
  if (lastTime > 0) { const dt = ts - lastTime; dtScale = Math.min(Math.max(dt / 16.67, 0.5), 5); }
  lastTime = ts;
  if (gameState === 'title') {
    ct.clearRect(0, 0, W, H); drawTitle();
  } else if (gameState === 'dead') {
    draw(); drawDead();
  } else {
    playTime++; update(); draw(); drawTutorial();
  }
  requestAnimationFrame(loop);
}

/* ═══ START/CLICK HANDLERS ═══ */
function handleStart(ex, ey) {
  if (gameState === 'title') {
    SFX.start();
    gameState = 'playing';
    bears = []; spawnWave(1);
    loadSave();
    return;
  }
  if (gameState === 'dead') {
    const bx = CX - 100, by = H * .64, bw = 200, bh = 52;
    if (ex >= bx && ex <= bx + bw && ey >= by && ey <= by + bh) restartGame();
  }
}
cv.addEventListener('click', e => {
  const r = cv.getBoundingClientRect();
  handleStart(e.clientX - r.left, e.clientY - r.top);
});
cv.addEventListener('touchend', e => {
  e.preventDefault();
  if (gameState === 'title' || gameState === 'dead') {
    const r = cv.getBoundingClientRect(), t = e.changedTouches[0];
    handleStart(t.clientX - r.left, t.clientY - r.top);
  }
}, {passive: false});

(function initTrees() {
  for (let i = 0; i < 520; i++) {
    let x, y, tries = 0;
    do {
      x = 80 + Math.random() * (WS - 160);
      y = 80 + Math.random() * (WS - 160);
      tries++;
    } while (tries < 300 && isNearBase(x, y, 110));
    trees.push({x, y, r: 14 + Math.random() * 18, cd: 0, type: Math.random() < .15 ? 'pine' : 'oak'});
  }
})();
requestAnimationFrame(loop);
</script>
